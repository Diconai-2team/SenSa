<!-- section_11_workers.html — ⑪ 작업자 현황 (실시간 지오펜스 연동) -->
<div id="section-11-workers" class="panel-section">
  <div class="panel-title">작업자 현황<a class="detail-link">+ 상세 보기</a></div>

  <!-- 도넛 차트 + 범례 -->
  <div class="worker-chart-area">
    <div class="donut-wrapper">
      <canvas id="worker-donut"></canvas>
      <div class="donut-center">
        <span class="donut-center-num" id="worker-total">0</span>
        <span class="donut-center-label">총원</span>
      </div>
    </div>
    <div class="worker-legend">
      <div class="legend-row">
        <span class="legend-dot danger"></span>
        <span class="legend-label">위험</span>
        <strong class="legend-count" id="worker-danger-count">0</strong>
        <span class="legend-unit">명</span>
      </div>
      <div class="legend-row">
        <span class="legend-dot caution"></span>
        <span class="legend-label">주의</span>
        <strong class="legend-count" id="worker-caution-count">0</strong>
        <span class="legend-unit">명</span>
      </div>
      <div class="legend-row">
        <span class="legend-dot normal"></span>
        <span class="legend-label">정상</span>
        <strong class="legend-count" id="worker-normal-count">0</strong>
        <span class="legend-unit">명</span>
      </div>
    </div>
  </div>

  <!-- 작업자 개별 상태 목록 -->
  <div id="worker-status-list"></div>
</div>
