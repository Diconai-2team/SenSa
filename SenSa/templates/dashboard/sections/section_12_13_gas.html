<!-- ⑫ 유해가스 위험 현황 -->
<div id="section-12-gas-table" class="bottom-panel">
  <div class="bottom-panel-title">유해가스 위험 현황
    <div class="sensor-tab-group">
      <button class="sensor-tab active" data-sensor="sensor_01">가스 1</button>
      <button class="sensor-tab" data-sensor="sensor_02">가스 2</button>
      <button class="sensor-tab" data-sensor="sensor_03">가스 3</button>
    </div>
  </div>
  <table class="data-table" id="gas-status-table">
    <thead><tr><th>가스 종류</th><th>현재 농도</th><th>단위</th><th>위험도</th></tr></thead>
    <tbody>
      <tr><td class="gas-name">O2(산소)</td>        <td class="gas-value" id="val-o2">20.9</td> <td class="gas-unit">%</td>  <td><span class="status-badge status-normal" id="badge-o2">정상</span></td></tr>
      <tr><td class="gas-name">CO(일산화탄소)</td>  <td class="gas-value" id="val-co">12</td>   <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-co">정상</span></td></tr>
      <tr><td class="gas-name">CO2(이산화탄소)</td> <td class="gas-value" id="val-co2">600</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-co2">정상</span></td></tr>
      <tr><td class="gas-name">H2S(황화수소)</td>   <td class="gas-value" id="val-h2s">0.3</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-h2s">정상</span></td></tr>
      <tr><td class="gas-name">NO2(이산화질소)</td> <td class="gas-value" id="val-no2">1.5</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-no2">정상</span></td></tr>
      <tr><td class="gas-name">SO2(이산화황)</td>   <td class="gas-value" id="val-so2">1.0</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-so2">정상</span></td></tr>
      <tr><td class="gas-name">O3(오존)</td>        <td class="gas-value" id="val-o3">0.03</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-o3">정상</span></td></tr>
      <tr><td class="gas-name">NH3(암모니아)</td>   <td class="gas-value" id="val-nh3">10</td>  <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-nh3">정상</span></td></tr>
      <tr><td class="gas-name">VOC(유기화합물)</td> <td class="gas-value" id="val-voc">0.3</td> <td class="gas-unit">ppm</td><td><span class="status-badge status-normal" id="badge-voc">정상</span></td></tr>
    </tbody>
  </table>
</div>
