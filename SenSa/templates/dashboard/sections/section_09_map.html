<!-- section_09_map.html — ⑨ 탭 네비게이션 + 지도 + 오버레이 -->
<!-- 탭 -->
<nav id="section-09-tabs">
  <button class="tab-btn active" data-tab="all">전체</button>
  <button class="tab-btn" data-tab="workers">작업자</button>
  <button class="tab-btn" data-tab="geofence">위험구역</button>
  <button class="tab-btn" data-tab="gas">유해가스 센서</button>
  <button class="tab-btn" data-tab="equipment">설비</button>
  <button class="tab-btn" data-tab="power">스마트 전력 시스템</button>
  <button class="tab-btn" data-tab="location">위치 센서</button>
</nav>

<!-- 지도 -->
<div id="map-area">
  <div id="map-toolbar">
    <span>📍 실시간 모니터링</span>
    <span id="coord-display">x: –, y: –</span>
    <button id="draw-fence-btn" class="toolbar-btn primary" onclick="toggleDrawMode()">✏️ 지오펜스 그리기</button>
    <button id="clear-draw-btn" class="toolbar-btn secondary" onclick="clearCurrentDraw()">↩ 취소</button>
  </div>

  <div id="map"></div>

  <!-- 시뮬레이션 오버레이 -->
  <div id="sim-overlay">
    <div class="scenario-btns">
      <div class="scenario-btn normal" onclick="setScenario('normal')">✅ 정상</div>
      <div class="scenario-btn mixed active" onclick="setScenario('mixed')">⚠️ 혼합</div>
      <div class="scenario-btn danger" onclick="setScenario('danger')">🚨 위험</div>
    </div>
    <div id="sim-tick-display">경과: <span id="sim-tick">0</span>초</div>
  </div>

  <!-- 레이어 토글 -->
  <div id="layer-overlay">
    <div class="layer-toggle"><label>⚠️ 지오펜스</label><label class="toggle-switch"><input type="checkbox" id="layer-geofence" checked><span class="slider"></span></label></div>
    <div class="layer-toggle"><label>📡 센서</label><label class="toggle-switch"><input type="checkbox" id="layer-sensor" checked><span class="slider"></span></label></div>
    <div class="layer-toggle"><label>👷 작업자</label><label class="toggle-switch"><input type="checkbox" id="layer-worker" checked><span class="slider"></span></label></div>
  </div>

  <!-- 업로드 -->
  <div id="upload-overlay">
    <div id="upload-area" onclick="document.getElementById('file-input').click()">
      <span class="upload-icon">📐</span>
      <strong id="upload-label">평면도 업로드</strong>
      <p>JPG, PNG</p>
    </div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="alarm-toast-container"></div>
  <div id="draw-hint">클릭으로 꼭짓점 추가 → 첫 점 재클릭으로 완성 (최소 3개)</div>
</div>

<!-- 지오펜스 모달 -->
<div id="fence-modal">
  <div class="modal-box">
    <h2>구역 저장</h2>
    <div class="form-group"><label>구역명 *</label><input type="text" id="fence-name" placeholder="예: 구역 A"></div>
    <div class="form-group"><label>구역 유형</label><select id="fence-type">
      <option value="open">개방구역</option>
      <option value="monitored">상시감시</option>
      <option value="hazardous">유해구역</option>
      <option value="restricted">출입금지</option>
    </select></div>
    <div class="form-group"><label>설명</label><textarea id="fence-desc" placeholder="구역 설명 (선택)"></textarea></div>
    <div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">취소</button><button class="btn-primary" onclick="saveGeoFence()">저장</button></div>
  </div>
</div>
